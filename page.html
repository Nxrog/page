<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.scaledrone.com/scaledrone.min.js"></script>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
  }

  body::before {
    content: '';
    position: fixed;
    width: 200%;
    height: 200%;
    top: -50%;
    left: -50%;
    background-image: radial-gradient(white 1px, transparent 1px);
    background-size: 50px 50px;
    animation: stars 8s linear infinite;
    opacity: 0.3;
    pointer-events: none;
  }

  @keyframes stars {
    0% { transform: translateY(0); }
    100% { transform: translateY(50px); }
  }

  .shooting-star {
    position: fixed;
    width: 150px;
    height: 2px;
    background: linear-gradient(135deg, white, transparent);
    border-radius: 50%;
    animation: shoot linear infinite;
    opacity: 0;
    pointer-events: none;
  }

  .shooting-star:nth-child(1) { left: 10%; top: -150px; animation-duration: 6s; animation-delay: 0s; }
  .shooting-star:nth-child(2) { left: 30%; top: -150px; animation-duration: 7s; animation-delay: 1.5s; }
  .shooting-star:nth-child(3) { left: 50%; top: -150px; animation-duration: 5s; animation-delay: 3s; }
  .shooting-star:nth-child(4) { left: 70%; top: -150px; animation-duration: 9s; animation-delay: 0.8s; }
  .shooting-star:nth-child(5) { left: 90%; top: -150px; animation-duration: 4.5s; animation-delay: 2s; }
  .shooting-star:nth-child(6) { left: 55%; top: -150px; animation-duration: 9s; animation-delay: 0.8s; }
  .shooting-star:nth-child(7) { left: 100%; top: -150px; animation-duration: 7.5s; animation-delay: 2s; }

  @keyframes shoot {
    0% { transform: translate(0, 0) rotate(-220deg); opacity: 1; }
    100% { transform: translate(200px, 110vh) rotate(220deg); opacity: 0; }
  }

  .launcher {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    position: relative;
    z-index: 1;
  }

  .launcher input {
    width: 400px;
    padding: 14px 20px;
    font-size: 18px;
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 6px;
    color: white;
    outline: none;
    letter-spacing: 1px;
    transition: border 0.3s;
  }

  .launcher input:focus { border-color: white; }
  .launcher input::placeholder { color: rgba(255,255,255,0.3); }

  .btn {
    padding: 14px 60px;
    font-size: 22px;
    font-weight: 900;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    background: transparent;
    border: 2px solid white;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 4px;
    text-transform: uppercase;
    transition: all 0.3s;
  }

  .btn:hover {
    background: white;
    color: black;
    box-shadow: 0 0 40px white;
  }

 .site-btn {
  padding: 12px 18px;
  background: #111;
  border: 1px solid #2a2a2a;
  border-radius: 8px;
  color: #f5f5f5;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.6px;
  text-align: left;
  width: 100%;

  transition: 
    background 0.2s ease,
    border-color 0.2s ease,
    transform 0.15s ease,
    box-shadow 0.2s ease;
}

.site-btn:hover {
  background: #1a1a1a;
  border-color: rgba(255, 230, 0, 0.6);
  box-shadow: 0 0 12px rgba(255, 230, 0, 0.25);
  transform: translateY(-2px);
}

.site-btn:active {
  transform: translateY(0);
  box-shadow: inset 0 2px 6px rgba(0,0,0,0.5);
}

  .error {
    color: #ff5555;
    font-size: 14px;
    letter-spacing: 1px;
    display: none;
  }

  #viewer {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 100;
    flex-direction: column;
  }

  #topbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 12px;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    z-index: 101;
  }

  #topbar button {
    padding: 5px 14px;
    font-size: 13px;
    font-weight: bold;
    color: white;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.4);
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  #topbar button:hover { background: white; color: black; }

  #site-frame {
    flex: 1;
    border: none;
    width: 100%;
  }

  .yellow {
    color: yellow;
    font-style: italic;
    cursor: pointer;
    text-decoration: underline;
  }

  .KYSVRO {
    position: fixed;
    bottom: 30px;
    right: 20px;
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 8px;
    padding: 15px 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    z-index: 1;
    max-width: 400px;
  }

  .KYSVRO h5 {
    margin: 0 0 8px 0;
    font-size: 20px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .KYSVRO p {
    margin: 0;
    font-size: 13px;
    opacity: 0.7;
    line-height: 1.5;
  }

  .online-box {
    position: fixed;
    top: 20px;
    right: 20px;
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 8px;
    padding: 10px 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    z-index: 1;
    font-size: 18px;
    letter-spacing: 2px;
  }

  #bookmarks-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 500px;
  }

  .bookmark-chip {
    padding: 5px 12px;
    font-size: 13px;
    color: white;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .bookmark-chip:hover { background: rgba(255,255,255,0.2); }

  .bookmark-chip .remove {
    opacity: 0.5;
    font-size: 11px;
    cursor: pointer;
  }

  .bookmark-chip .remove:hover { opacity: 1; color: #ff5555; }

  #star-btn {
    font-size: 18px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 5px 8px;
    transition: transform 0.2s;
  }

  #star-btn:hover { transform: scale(1.3); }

  #chat-widget {
    position: fixed;
    bottom: 30px;
    left: 20px;
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }

  #chat-toggle {
    padding: 10px 20px;
    font-size: 15px;
    color: white;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 8px;
    cursor: pointer;
    backdrop-filter: blur(10px);
    letter-spacing: 2px;
    transition: all 0.3s;
  }

  #chat-toggle:hover { background: rgba(255,255,255,0.15); }

  #name-prompt-box, #chat-box {
    display: none;
    flex-direction: column;
    width: 300px;
    background: rgba(10,10,10,0.95);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    overflow: hidden;
    backdrop-filter: blur(20px);
    margin-bottom: 10px;
    animation: chatOpen 0.7s ease;
  }

  #chat-box { height: 380px; }

  @keyframes chatOpen {
    0% { opacity: 0; transform: translateY(20px) scale(0.95); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  .chat-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 2px;
  }

  .chat-header button {
    background: none;
    border: none;
    color: white;
    cursor: pointer;
    font-size: 16px;
    padding: 0;
  }

  #name-prompt-box .inner {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 20px 14px;
  }

  #name-prompt-box input {
    padding: 10px 14px;
    font-size: 14px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 6px;
    color: white;
    outline: none;
    letter-spacing: 1px;
  }

  #name-prompt-box input::placeholder { color: rgba(255,255,255,0.3); }

  #name-prompt-box .join-btn {
    padding: 8px;
    font-size: 14px;
    font-weight: 900;
    color: white;
    background: transparent;
    border: 2px solid white;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 3px;
    text-transform: uppercase;
    transition: all 0.3s;
  }

  #name-prompt-box .join-btn:hover { background: white; color: black; }

  #chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.1) transparent;
  }

  .chat-msg {
    font-size: 13px;
    color: rgba(255,255,255,0.8);
    line-height: 1.5;
    word-break: break-word;
  }

  .chat-msg .name {
    font-weight: bold;
    margin-right: 6px;
  }

  .chat-msg.mine .name { color: #7eb8ff; }
  .chat-msg.other .name { color: #ffcc66; }

  .chat-msg.system {
    color: rgba(255,255,255,0.3);
    font-style: italic;
    font-size: 11px;
    text-align: center;
  }

  #chat-input-row {
    display: flex;
    border-top: 1px solid rgba(255,255,255,0.1);
  }

  #chat-input {
    flex: 1;
    background: transparent;
    border: none;
    padding: 10px 14px;
    color: white;
    font-size: 13px;
    outline: none;
  }

  #chat-input::placeholder { color: rgba(255,255,255,0.2); }

  #chat-input-row button {
    padding: 10px 14px;
    background: transparent;
    border: none;
    border-left: 1px solid rgba(255,255,255,0.1);
    color: white;
    cursor: pointer;
    font-size: 16px;
    transition: background 0.2s;
  }

  #chat-input-row button:hover { background: rgba(255,255,255,0.1); }
</style>
</head>
<body>

<script>
  const palettes = ['#0a0a0a','#05050f','#050f05','#0f0505','#07050f','#0a080a','#050a0f','#0f0a05'];
  document.body.style.background = palettes[Math.floor(Math.random() * palettes.length)];
</script>

<div class="shooting-star"></div>
<div class="shooting-star"></div>
<div class="shooting-star"></div>
<div class="shooting-star"></div>
<div class="shooting-star"></div>
<div class="shooting-star"></div>
<div class="shooting-star"></div>

<div class="launcher" id="launcher">
  <input id="url-input" type="text" placeholder="enter a website..." />
  <div style="display:flex; gap:10px; align-items:center;">
    <button class="btn" onclick="window.openSite()">OPEN</button>
    <button id="blob-btn" onclick="window.toggleBlob()" style="padding:14px 20px; font-size:14px; font-weight:900; color:white; background:transparent; border:2px solid rgba(255,255,255,0.4); border-radius:4px; cursor:pointer; letter-spacing:2px; transition:all 0.3s;">🔲 BLOB</button>
  </div>
  <span class="error" id="error-msg"></span>
  <div id="bookmarks-bar"></div>
</div>

<div id="viewer">
  <div id="topbar">
    <button onclick="window.goBack()">← BACK</button>
    <button id="star-btn" onclick="window.addBookmark()">⭐</button>
  </div>
  <iframe id="site-frame"></iframe>
</div>

<div class="KYSVRO">
  <h5>Some information for you because you might need it.</h5>
  <p>Since there is no proxy put in links that work with iframes not youtube.com</p>
  <div style="display:flex; flex-direction:column; gap:8px; margin-top:12px;">
    <button class="site-btn" onclick="window.loadSite('https://math.ivannazarov.com/')"> Truffled</button>
    <button class="site-btn" onclick="window.loadSite('https://play.frogiee1.net/')"> Froggie</button>
    <button class="site-btn" onclick="window.loadSite('https://yinandyang.twilightparadox.com/')"> Utopia</button>
   <button class="site-btn" onclick="window.loadSite('https://s3.amazonaws.com/shindoisbest/index.html')"> GN-math</button>
  </div>
</div>


<div class="online-box">
  <p>🟢 <span id="count">0</span> maybe online</p>
</div>

<div id="chat-widget">
  <button id="chat-toggle" onclick="window.toggleChat()">Chat</button>
  <div id="name-prompt-box">
    <div class="chat-header">
      <span>SET USERNAME</span>
      <button onclick="window.toggleChat()">✕</button>
    </div>
    <div class="inner">
      <input id="name-input" type="text" maxlength="20" placeholder="enter a username..."/>
      <button class="join-btn" onclick="window.saveName()">JOIN</button>
    </div>
  </div>

  <div id="chat-box">
    <div class="chat-header">
      <span id="chat-name"><a style="color: yellow;">Chats do not save</a></span>
      <button onclick="window.toggleChat()">✕</button>
    </div>
    <div id="chat-messages"></div>
    <div id="chat-input-row">
      <input id="chat-input" type="text" placeholder="say something..." maxlength="200"/>
      <button onclick="window.sendMessage()">↑</button>
    </div>
  </div>
</div>

<script>
  let myName = localStorage.getItem('jg-username') || null;
  let currentURL = '';
  let _drone = null;

  function initScaledrone() {
    if (typeof Scaledrone === 'undefined') { setTimeout(initScaledrone, 100); return; }
    _drone = new Scaledrone('XFwPn604jeNvOCyH');
    _drone.on('open', () => {
      const room = _drone.subscribe('observable-room');
      room.on('members', members => { document.getElementById('count').textContent = members.length; });
      room.on('member_join', () => { document.getElementById('count').textContent = parseInt(document.getElementById('count').textContent) + 1; });
      room.on('member_leave', () => { document.getElementById('count').textContent = parseInt(document.getElementById('count').textContent) - 1; });

      const chatRoom = _drone.subscribe('chat-room');
      chatRoom.on('message', (message) => {
        const data = message.data;
        const msgs = document.getElementById('chat-messages');
        if (!msgs) return;
        const div = document.createElement('div');
        if (data.type === 'system') {
          div.className = 'chat-msg system';
          div.textContent = data.text;
        } else {
          const isMine = data.name === myName;
          div.className = 'chat-msg ' + (isMine ? 'mine' : 'other');
          div.innerHTML = `<span class="name">${data.name}</span>${data.text}`;
        }
        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
      });

      if (myName) {
        _drone.publish({ room: 'chat-room', message: { type: 'system', text: myName + ' joined 👋' } });
      }
    });
  }
  initScaledrone();

  if (myName) document.getElementById('chat-name').textContent = '👤 ' + myName;

  function normURL(raw) {
    raw = raw.trim();
    if (!raw) return null;
    if (!/^https?:\/\//i.test(raw)) raw = 'https://' + raw;
    try { return new URL(raw); } catch { return null; }
  }

  function getBookmarks() {
    try { return JSON.parse(localStorage.getItem('jg-bookmarks') || '[]'); } catch { return []; }
  }

  function saveBookmarks(bm) {
    try { localStorage.setItem('jg-bookmarks', JSON.stringify(bm)); } catch {}
  }

  function renderBookmarks() {
    const bar = document.getElementById('bookmarks-bar');
    const bm = getBookmarks();
    bar.innerHTML = '';
    bm.forEach((b, i) => {
      const chip = document.createElement('div');
      chip.className = 'bookmark-chip';
      chip.innerHTML = `<span onclick="window.loadSite('${b.url}')">${b.label}</span><span class="remove" onclick="window.removeBookmark(${i})">✕</span>`;
      bar.appendChild(chip);
    });
  }

  window.addBookmark = function() {
    if (!currentURL) return;
    const bm = getBookmarks();
    const label = new URL(currentURL).hostname.replace('www.', '');
    if (bm.find(b => b.url === currentURL)) return;
    bm.push({ url: currentURL, label });
    saveBookmarks(bm);
    renderBookmarks();
    document.getElementById('star-btn').textContent = '✅';
    setTimeout(() => document.getElementById('star-btn').textContent = '⭐', 1500);
  }

  window.removeBookmark = function(i) {
    const bm = getBookmarks();
    bm.splice(i, 1);
    saveBookmarks(bm);
    renderBookmarks();
  }

  window.openSite = function() {
    const input = document.getElementById('url-input');
    const errEl = document.getElementById('error-msg');
    const parsed = normURL(input.value);
    errEl.style.display = 'none';
    if (!parsed) { errEl.textContent = 'Not real try again bro'; errEl.style.display = 'block'; return; }
    currentURL = parsed.href;
    const frame = document.getElementById('site-frame');
    const viewer = document.getElementById('viewer');
    const launcher = document.getElementById('launcher');
    launcher.style.display = 'none';
    viewer.style.display = 'flex';
    frame.src = currentURL;
  }

  window.loadSite = function(url) {
    document.getElementById('url-input').value = url;
    window.openSite();
  }

  window.goBack = function() {
    const viewer = document.getElementById('viewer');
    const launcher = document.getElementById('launcher');
    const frame = document.getElementById('site-frame');
    frame.src = '';
    viewer.style.display = 'none';
    launcher.style.display = 'flex';
    document.getElementById('star-btn').textContent = '⭐';
  }

  window.saveName = function() {
    const input = document.getElementById('name-input').value.trim();
    if (!input) return;
    localStorage.setItem('jg-username', input);
    myName = input;
    document.getElementById('chat-name').textContent = '👤 ' + myName;
    document.getElementById('name-prompt-box').style.display = 'none';
    document.getElementById('chat-box').style.display = 'flex';
    document.getElementById('chat-toggle').style.display = 'none';
    if (_drone) _drone.publish({ room: 'chat-room', message: { type: 'system', text: input + ' joined 👋' } });
  }

  window.toggleChat = function() {
    const toggle = document.getElementById('chat-toggle');
    const chatBox = document.getElementById('chat-box');
    const nameBox = document.getElementById('name-prompt-box');
    const isOpen = chatBox.style.display === 'flex' || nameBox.style.display === 'flex';
    if (isOpen) {
      chatBox.style.display = 'none';
      nameBox.style.display = 'none';
      toggle.style.display = 'block';
    } else {
      toggle.style.display = 'none';
      if (!myName) {
        nameBox.style.display = 'flex';
      } else {
        chatBox.style.display = 'flex';
      }
    }
  }

  window.sendMessage = function() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text || !myName || !_drone) return;
    _drone.publish({ room: 'chat-room', message: { type: 'msg', name: myName, text: text } });
    input.value = '';
  }

  document.getElementById('url-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') window.openSite();
  });

  document.getElementById('name-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') window.saveName();
  });

  document.getElementById('chat-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') window.sendMessage();
  });

  renderBookmarks();
let blobMode = false;

window.toggleBlob = function() {
  blobMode = !blobMode;
  document.getElementById('blob-btn').textContent = blobMode ? '🟦 Blob: ON' : '🔲 Blob: OFF';
}

window.openSite = function() {
  const input = document.getElementById('url-input');
  const errEl = document.getElementById('error-msg');
  const parsed = normURL(input.value);
  errEl.style.display = 'none';
  if (!parsed) { errEl.textContent = 'Not real try again bro'; errEl.style.display = 'block'; return; }
  currentURL = parsed.href;
  if (blobMode) {
    const html = `<!DOCTYPE html><html><head><title></title></head><body style="margin:0;padding:0;overflow:hidden;"><iframe src="${currentURL}" style="width:100vw;height:100vh;border:none;display:block;"></iframe></body></html>`;
    const blob = new Blob([html], {type: 'text/html'});
    window.open(URL.createObjectURL(blob), '_blank');
    return;
  }
  const frame = document.getElementById('site-frame');
  const viewer = document.getElementById('viewer');
  const launcher = document.getElementById('launcher');
  launcher.style.display = 'none';
  viewer.style.display = 'flex';
  frame.src = currentURL;
}


 
</script>

</body>
</html>
